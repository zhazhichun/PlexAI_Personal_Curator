<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlexAI Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <!-- Login Overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <div class="login-logo">🔐</div>
            <h2>Admin Dashboard</h2>
            <p class="login-subtitle">Enter admin password</p>
            <input type="password" id="passwordInput" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
            <div class="checkbox-container">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>
            <button onclick="doLogin()" class="login-btn">Login</button>
            <p class="login-error" id="loginError"></p>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div class="dashboard" id="dashboard" style="display:none">
        <!-- Header -->
        <header class="header">
            <div class="header-right">
                <div class="header-logo">🤖</div>
                <div>
                    <h1>PlexAI Dashboard</h1>
                    <p class="header-subtitle">Manage AI recommendations</p>
                </div>
            </div>
            <div class="header-left">
                <button class="logout-btn" onclick="logout()" title="Logout">
                    🚪
                </button>
                <div class="stat-chip" id="userCount">
                    <span class="stat-icon">👥</span>
                    <span class="stat-value">-</span>
                    <span class="stat-label">Users</span>
                </div>
                <button class="trigger-all-btn" onclick="triggerAll()">
                    🚀 Trigger All
                </button>
            </div>
        </header>

        <!-- Users Section -->
        <section class="section">
            <div class="section-header">
                <h2>👥 Registered Users</h2>
                <button class="refresh-btn" onclick="loadUsers()">🔄 Refresh</button>
            </div>
            <div class="users-grid" id="usersGrid">
                <div class="loading">Loading...</div>
            </div>
        </section>

        <!-- Runs Section -->
        <section class="section">
            <div class="section-header">
                <h2>📊 Recent Runs</h2>
                <button class="refresh-btn" onclick="loadRuns()">🔄 Refresh</button>
            </div>
            <div class="runs-table-container">
                <table class="runs-table" id="runsTable">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Status</th>
                            <th>Start</th>
                            <th>End</th>
                            <th>Items</th>
                            <th>Error</th>
                        </tr>
                    </thead>
                    <tbody id="runsBody">
                        <tr>
                            <td colspan="6" class="loading">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="admin.js"></script>
</body>

</html>
